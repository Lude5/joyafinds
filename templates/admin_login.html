<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:#fafaf8;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}.box{background:#fff;border:1px solid #e8e8e4;border-radius:14px;padding:40px 32px;max-width:360px;width:100%;text-align:center}h1{font-size:20px;margin-bottom:20px}input{width:100%;padding:12px;border:1px solid #e8e8e4;border-radius:10px;font-size:14px;margin-bottom:12px;outline:none}input:focus{border-color:#22c55e}button{width:100%;padding:12px;background:#22c55e;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}button:hover{background:#16a34a}.err{color:#e63946;font-size:13px;margin-bottom:10px}</style></head>
<body><div class="box"><h1>Admin Login</h1>{% if error %}<p class="err">{{ error }}</p>{% endif %}<form method="POST"><input type="password" name="password" placeholder="Password" required autofocus><button type="submit">Login</button></form></div></body></html>
