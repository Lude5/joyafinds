<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:#fafaf8;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}.box{background:#fff;border:1px solid #e8e8e4;border-radius:14px;padding:40px 32px;max-width:360px;width:100%;text-align:center}h1{font-size:20px;margin-bottom:20px}input{width:100%;padding:12px;border:1px solid #e8e8e4;border-radius:10px;font-size:14px;margin-bottom:12px;outline:none}input:focus{border-color:#22c55e}button{width:100%;padding:12px;background:#22c55e;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}button:hover{background:#16a34a}.err{color:#e63946;font-size:13px;margin-bottom:10px}</style></head>
<body><div class="box"><h1>Admin Login</h1>{% if error %}<p class="err">{{ error }}</p>{% endif %}<form method="POST"><input type="password" name="password" placeholder="Password" required autofocus><button type="submit">Login</button></form></div>
<!-- Admin language toggle (added by master admin) -->
<style>
.adm-lang-fab { position: fixed; bottom: 18px; right: 18px; z-index: 999; display: inline-flex; align-items: center; gap: 6px; padding: 10px 14px; background: rgba(20,20,22,0.95); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; color: rgba(255,255,255,0.9); font-family: 'Space Grotesk', monospace; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.4); backdrop-filter: blur(8px); user-select: none; }
.adm-lang-fab:hover { background: rgba(6,182,212,0.15); border-color: rgba(6,182,212,0.5); color: rgb(6,182,212); }
.adm-lang-fab .arrow { opacity: 0.5; font-size: 11px; }
</style>
<button type="button" class="adm-lang-fab" onclick="toggleAdminLang()" title="Switch language" aria-label="Switch language">
    <span data-lang-label>EN</span><span class="arrow">&#8646;</span><span data-lang-other>中文</span>
</button>
<script src="/static/js/admin_i18n.js"></script>

</body></html>
